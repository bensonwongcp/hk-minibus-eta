<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ETA Dashboard">
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>香港巴士／小巴 ETA＋觀塘天氣</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #64748b;
      --line: #111111;
      --soft: #f8fafc;
      --accent: #0f766e;
      --danger: #dc2626;
      --warnbg: #fff7ed;
    }
    body.dark {
      --bg: #0b0f14;
      --fg: #e5eef7;
      --muted: #8ea2b5;
      --line: #243241;
      --soft: #111821;
      --accent: #4fd1c5;
      --danger: #f87171;
      --card: #0f1620;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang HK",
        "PingFang TC",
        "Microsoft JhengHei",
        "Noto Sans HK",
        "Noto Sans Traditional Chinese",
        system-ui,
        sans-serif;
    }
    body {
      padding: 12px;
    }
    button, input, select {
      font: inherit;
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      border: 2px solid var(--line);
      padding: 12px;
      background: var(--bg);
      border-radius: 18px;
    }
    .topbar,
    .toolbar,
    .status-row,
    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .topbar {
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .section-head {
      justify-content: space-between;
    }
    h1 {
      font-size: 20px;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0;
    }
    .toolbar {
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      border-radius: 999px;
    }
    .btn:hover,
    .btn.active {
      background: var(--fg);
      color: var(--bg);
    }
    .btn:disabled {
      opacity: .6;
      cursor: wait;
    }
    .btn.danger {
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn.danger:hover {
      background: var(--danger);
      color: #fff;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 16px;
    }
    .hidden {
      display: none !important;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      background: var(--bg);
      padding: 10px;
      border-radius: 14px;
    }
    .status-row {
      justify-content: space-between;
    }
    .note,
    .message {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }
    .message {
      min-height: 22px;
      margin-top: 8px;
    }
    .message.error {
      color: var(--danger);
    }
    .message.ok {
      color: var(--accent);
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .sum-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--bg);
      padding: 10px;
      min-height: 72px;
    }
    .sum-k {
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
    }
    .sum-v {
      font-size: 18px;
      font-weight: 900;
      margin-top: 4px;
    }
    .results {
      max-height: 280px;
      overflow-y: auto;
      margin-top: 10px;
    }
    .result {
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
    }
    .result:last-child {
      border-bottom: 0;
    }
    .result-name {
      font-size: 14px;
      font-weight: 900;
    }
    .result-detail {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: end;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      font-weight: 800;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      padding: 7px;
      background: var(--bg);
      color: var(--fg);
      border-radius: 12px;
    }
    .route-card {
      border: 1px solid var(--line);
      padding: 10px;
      background: var(--bg);
      border-radius: 14px;
    }
    .route-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 7px;
      margin-bottom: 8px;
    }
    .route-no {
      display: inline-block;
      min-width: 44px;
      text-align: center;
      background: var(--fg);
      color: var(--bg);
      padding: 3px 6px;
      font-weight: 900;
      border-radius: 8px;
    }
    .route-dest {
      flex: 1;
      font-weight: 900;
      font-size: 14px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .route-stop {
      font-size: 12px;
      color: var(--muted);
      margin: 5px 0;
    }
    .route-op {
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .route-head-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .etas {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .eta {
      border: 1px solid var(--line);
      text-align: center;
      min-height: 58px;
      padding: 6px 4px;
      border-radius: 12px;
    }
    .eta-op {
      font-size: 10px;
      font-weight: 900;
      color: var(--accent);
    }
    .eta-min {
      font-size: 16px;
      font-weight: 900;
      margin: 4px 0;
    }
    .eta-time {
      font-size: 11px;
      color: var(--muted);
    }
    .eta-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
    }
    .eta.soon {
      border-color: var(--accent);
      background: rgba(79,209,197,.08);
    }
    .empty {
      border: 1px dashed var(--danger);
      color: var(--danger);
      text-align: center;
      padding: 14px;
      font-size: 13px;
      border-radius: 14px;
    }
    .warning-box {
      margin-top: 10px;
      border: 1px solid var(--danger);
      background: var(--warnbg);
      padding: 10px;
      border-radius: 14px;
    }
    .warning-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }
    .warning-item {
      border: 1px solid var(--danger);
      color: var(--danger);
      background: var(--bg);
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 900;
      border-radius: 999px;
    }
    .footer {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 9px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 760px) {
      body {
        padding: 8px;
      }
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .form-grid .search-button {
        grid-column: span 2;
      }
      .cards {
        grid-template-columns: 1fr;
      }
    }
    body.dark {
      background: radial-gradient(circle at top,#101a27 0,#0b0f14 55%);
      color: var(--fg);
    }
    body.dark .app{
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      background:rgba(15,22,32,.9);
      backdrop-filter:blur(10px);
    }
    body.dark .panel,
    body.dark .route-card,
    body.dark .card,
    body.dark .warning-box{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--card);
    }
    body.dark .btn{
      border-radius:999px;
      background:transparent;
      border:1px solid var(--line);
      color:var(--fg);
    }
    body.dark .btn.active,
    body.dark .btn:hover{
      background:var(--accent);
      color:#081116;
      border-color:var(--accent);
    }
    body.dark .btn.danger{
      color:var(--danger);
      border-color:var(--danger);
    }
    body.dark .btn.danger:hover{
      background:var(--danger);
      color:#fff;
    }
    body.dark input,
    body.dark select{
      border-radius:12px;
      background:#09111a;
      border-color:var(--line);
      color:var(--fg);
    }
    body.dark .card,
    body.dark .route-card{
      box-shadow:0 8px 24px rgba(0,0,0,.22);
    }
  </style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div>
      <h1>香港巴士／小巴 ETA＋觀塘天氣</h1>
      <div class="note">iPhone PWA 本機版，可加入主畫面</div>
    </div>
    <div class="toolbar">
      <button id="home-btn" class="btn" type="button">屋企</button>
      <button id="office-btn" class="btn active" type="button">公司</button>
      <button id="refresh-btn" class="btn" type="button">重新整理</button>
      <button id="dark-btn" class="btn" type="button">夜間</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
      <button id="pin-filter-btn" class="btn">只看已釘選</button>
      <button id="all-filter-btn" class="btn active">全部路線</button>
      <button id="auto-refresh-btn" class="btn">自動更新：開</button>
      <button id="export-btn" class="btn">匯出</button>
      <button id="import-btn" class="btn">匯入</button>
      <input id="import-file" type="file" accept="application/json" class="hidden">
    </div>
  </header>

  <div class="summary" id="summary-strip">
    <div class="sum-box">
      <div class="sum-k">Saved routes</div>
      <div class="sum-v" id="sum-routes">0</div>
    </div>
    <div class="sum-box">
      <div class="sum-k">Pinned</div>
      <div class="sum-v" id="sum-pinned">0</div>
    </div>
    <div class="sum-box">
      <div class="sum-k">Next ETA</div>
      <div class="sum-v" id="sum-next">--</div>
    </div>
    <div class="sum-box">
      <div class="sum-k">Weather</div>
      <div class="sum-v" id="sum-weather">--</div>
    </div>
  </div>

  <section class="panel">
    <div class="status-row" style="margin-bottom:8px;">
      <h2>觀塘短期天氣</h2>
      <div style="display:flex;gap:12px;align-items:center">
        <div id="weather-updated" class="note">載入中…</div>
        <div id="status-chip" class="note" style="font-weight:900;color:var(--accent);">狀態：初始化</div>
      </div>
    </div>
    <div class="cards" style="grid-template-columns:1.4fr 1fr 1fr 1fr;">
      <div class="card">
        <div class="result-name">觀塘目前天氣</div>
        <div id="kwt-current-weather" style="font-size:18px;font-weight:900;margin-top:8px;">載入中…</div>
        <div id="kwt-current-detail" class="result-detail">正在讀取資料</div>
      </div>
      <div class="card">
        <div class="result-name">5 分鐘後</div>
        <div id="rain-5-value" style="font-size:18px;font-weight:900;margin-top:8px;">--</div>
        <div id="rain-5-detail" class="result-detail">--</div>
      </div>
      <div class="card">
        <div class="result-name">10 分鐘後</div>
        <div id="rain-10-value" style="font-size:18px;font-weight:900;margin-top:8px;">--</div>
        <div id="rain-10-detail" class="result-detail">--</div>
      </div>
      <div class="card">
        <div class="result-name">15 分鐘後</div>
        <div id="rain-15-value" style="font-size:18px;font-weight:900;margin-top:8px;">--</div>
        <div id="rain-15-detail" class="result-detail">--</div>
      </div>
    </div>
    <div class="panel" style="margin-top:10px;margin-bottom:0;">
      <h2>出門前提醒</h2>
      <div id="before-go-remark" class="note" style="margin-top:6px;">載入中…</div>
      <div class="warning-box">
        <div class="note">天文台警告：</div>
        <div id="warning-list" class="warning-list"></div>
      </div>
    </div>
    <div id="weather-chip" class="message ok" style="margin-top:8px;font-weight:900;">--</div>
  </section>

  <section class="panel">
    <h2>搜尋及加入路線</h2>
    <p class="note">開啟後可加入主畫面；離線時仍可看到已儲存路線。</p>
    <div class="form-grid">
      <label>
        營運商
        <select id="company">
          <option value="KMB">KMB / LWB</option>
          <option value="CTB">城巴 CTB</option>
          <option value="GMB">綠色小巴 GMB</option>
        </select>
      </label>
      <label id="region-wrap" class="hidden">
        GMB 優先地區
        <select id="region">
          <option value="HKI">HKI 香港島</option>
          <option value="KLN" selected>KLN 九龍</option>
          <option value="NT">NT 新界</option>
        </select>
      </label>
      <label>
        路線
        <input id="route" type="text" placeholder="例如 1A、619、2A" autocomplete="off">
      </label>
      <label>
        方向
        <select id="direction">
          <option value="outbound">去程</option>
          <option value="inbound">回程</option>
        </select>
      </label>
      <button id="search-btn" class="btn search-button" type="button">搜尋車站</button>
    </div>
    <div id="message" class="message">提示：首次搜尋 KMB 時可能需要下載車站資料。</div>
    <div id="results" class="results"></div>
  </section>

  <section>
    <div class="status-row" style="margin-bottom:8px;">
      <h2 id="place-title">公司路線</h2>
      <button id="clear-btn" class="btn danger" type="button">清空路線</button>
    </div>
    <div id="cards" class="cards"></div>
  </section>

  <section id="debug-panel" class="panel hidden" style="max-height:240px;overflow-y:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;white-space:pre-wrap;"></section>

  <footer class="footer">
    <span id="last-update">尚未更新</span>
    <span>｜ETA 每 30 秒更新｜天氣每 60 秒更新</span>
  </footer>
</main>

<script>
const STORAGE_KEY = "hk_eta_dashboard_v4";
const KMB_CACHE_KEY = "kmb_stops_cache_v1";
const KMB_CACHE_AGE = 7 * 24 * 60 * 60 * 1000;
const state = {
  activePlace: "office",
  home: { routes: [] },
  office: { routes: [] },
  kmbStops: null,
  debug: [],
  filterPinnedOnly: false,
  autoRefresh: true
};
let etasTimer = null;
let weatherTimer = null;
function $(id){ return document.getElementById(id); }
function escapeHtml(value){
  return String(value ?? "").replace(/[&<>\"']/g, char => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
  }[char]));
}
function normalRoute(value){
  return String(value || "").trim().toUpperCase().replace(/\s+/g, "");
}
function pickText(...values){
  for (const v of values) {
    if (v !== undefined && v !== null && String(v).trim() !== "") return String(v);
  }
  return "";
}
function setMessage(text, type=""){
  const target = $("message");
  target.className = `message ${type}`;
  target.textContent = text;
}
function getRoutes(){ return state[state.activePlace].routes; }
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    activePlace: state.activePlace,
    home: state.home,
    office: state.office,
    filterPinnedOnly: state.filterPinnedOnly,
    autoRefresh: state.autoRefresh
  }));
}
function loadState(){
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (!saved) return;
    state.activePlace = saved.activePlace === "home" ? "home" : "office";
    state.home.routes = Array.isArray(saved.home?.routes) ? saved.home.routes : [];
    state.office.routes = Array.isArray(saved.office?.routes) ? saved.office.routes : [];
    state.filterPinnedOnly = !!saved.filterPinnedOnly;
    state.autoRefresh = saved.autoRefresh !== false;
  } catch {}
}
function renderPlace(){
  const isHome = state.activePlace === "home";
  $("home-btn").classList.toggle("active", isHome);
  $("office-btn").classList.toggle("active", !isHome);
  $("place-title").textContent = isHome ? "屋企路線" : "公司路線";
}
function setPlace(place){
  state.activePlace = place;
  saveState();
  renderPlace();
  refreshEtas();
  updateSummary();
}
function parseHongKongDate(value){
  if (!value) return null;
  const string = String(value).trim().replace(" ", "T");
  const date = new Date(
    string.endsWith("Z") || string.includes("+08:00") || string.includes("+0800")
      ? string
      : `${string}+08:00`
  );
  return Number.isNaN(date.getTime()) ? null : date;
}
function etaMinutes(value){
  const date = parseHongKongDate(value);
  if (!date) return Infinity;
  return Math.floor((date.getTime() - Date.now()) / 60000);
}
function etaText(value){
  const minutes = etaMinutes(value);
  if (!Number.isFinite(minutes)) return "--";
  if (minutes <= 0) return "即將";
  return `${minutes} 分`;
}
function etaTime(value){
  const date = parseHongKongDate(value);
  if (!date) return "--:--";
  return date.toLocaleTimeString("en-GB", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
    timeZone: "Asia/Hong_Kong"
  });
}
function isLiveEta(value){
  const date = parseHongKongDate(value);
  return date && date.getTime() >= Date.now() - 60_000;
}
async function fetchJSON(url, timeout = 15000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, {
      signal: controller.signal,
      cache: "no-store"
    });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    return await response.json();
  } finally {
    clearTimeout(timer);
  }
}
async function safeFetch(url, timeout = 15000){
  const attempts = [
    url,
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    "https://corsproxy.io/?" + url
  ];
  let lastError = null;
  for (const attempt of attempts) {
    try {
      return await fetchJSON(attempt, timeout);
    } catch (error) {
      lastError = error;
    }
  }
  throw new Error(lastError?.message || "無法連接資料服務");
}
async function getKmbStops(){
  if (state.kmbStops) return state.kmbStops;
  try {
    const cached = JSON.parse(localStorage.getItem(KMB_CACHE_KEY) || "null");
    if (cached?.savedAt && cached?.map && Date.now() - cached.savedAt < KMB_CACHE_AGE) {
      state.kmbStops = cached.map;
      return state.kmbStops;
    }
  } catch {}
  const json = await safeFetch("https://data.etabus.gov.hk/v1/transport/kmb/stop", 30000);
  const map = {};
  for (const stop of json.data || []) {
    if (stop.stop) map[stop.stop] = stop;
  }
  state.kmbStops = map;
  try {
    localStorage.setItem(KMB_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), map }));
  } catch {}
  return map;
}
function getStopName(stop){
  return pickText(stop?.name_tc, stop?.name_en, stop?.name_sc, "未命名車站");
}
async function searchKmb(route, direction){
  const bound = direction === "inbound" ? "I" : "O";
  const directionText = direction === "inbound" ? "inbound" : "outbound";
  const [stopsJson, routeJson, stopMap] = await Promise.all([
    safeFetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${encodeURIComponent(route)}/${directionText}/1`),
    safeFetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${encodeURIComponent(route)}/${bound}/1`).catch(() => ({ data: {} })),
    getKmbStops()
  ]);
  const destination = pickText(routeJson.data?.dest_tc, routeJson.data?.dest_en);
  return (stopsJson.data || []).map(row => ({
    company: "KMB",
    route,
    stopId: row.stop,
    stopName: getStopName(stopMap[row.stop]),
    destination,
    bound
  }));
}
async function searchCtb(route, direction){
  const bound = direction === "inbound" ? "inbound" : "outbound";
  const [stopsJson, routeJson] = await Promise.all([
    safeFetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${encodeURIComponent(route)}/${bound}`),
    safeFetch(`https://rt.data.gov.hk/v2/transport/citybus/route/CTB/${encodeURIComponent(route)}/${bound}`).catch(() => ({ data: {} }))
  ]);
  const info = Array.isArray(routeJson.data) ? routeJson.data[0] : routeJson.data || {};
  const destination = pickText(info.dest_tc, info.dest_en);
  return Promise.all(
    (stopsJson.data || []).map(async row => {
      let stopName = `車站 ${row.seq || ""}`;
      try {
        const stopJson = await safeFetch(`https://rt.data.gov.hk/v2/transport/citybus/stop/${encodeURIComponent(row.stop)}`);
        stopName = getStopName(stopJson.data);
      } catch {}
      return {
        company: "CTB",
        route,
        stopId: row.stop,
        stopName,
        destination,
        bound
      };
    })
  );
}
async function searchGmbInRegion(route, regionCode){
  const detailJson = await safeFetch(`https://data.etagmb.gov.hk/route/${encodeURIComponent(regionCode)}/${encodeURIComponent(route)}`);
  const variants = Array.isArray(detailJson.data) ? detailJson.data : (detailJson.data ? [detailJson.data] : []);
  const results = [];
  for (const variant of variants) {
    const routeId = variant.route_id ?? variant.routeId;
    const directions = Array.isArray(variant.directions) ? variant.directions : (variant.directions ? [variant.directions] : []);
    if (!routeId || !directions.length) continue;
    for (const dir of directions) {
      const routeSeq = Number(dir.route_seq ?? dir.routeSeq);
      if (!Number.isFinite(routeSeq)) continue;
      const destination = pickText(
        dir.dest_tc, dir.dest_en,
        variant.dest_tc, variant.dest_en,
        variant.description_tc, variant.description_en
      );
      const stopJson = await safeFetch(`https://data.etagmb.gov.hk/route-stop/${encodeURIComponent(routeId)}/${encodeURIComponent(routeSeq)}`);
      const routeStops = Array.isArray(stopJson.data?.route_stops)
        ? stopJson.data.route_stops
        : Array.isArray(stopJson.data) ? stopJson.data : [];
      for (const stop of routeStops) {
        const stopId = stop.stop_id ?? stop.stopId;
        const stopSeq = Number(stop.stop_seq ?? stop.stopSeq);
        if (!stopId || !Number.isFinite(stopSeq)) continue;
        results.push({
          company: "GMB",
          route,
          region: regionCode,
          routeId: String(routeId),
          routeSeq,
          stopSeq,
          stopId: String(stopId),
          stopName: pickText(stop.name_tc, stop.name_en, stop.stop_name_tc, stop.stop_name_en, `車站 ${stopSeq}`),
          destination
        });
      }
    }
  }
  return results;
}
async function searchGmb(route, region){
  const preferred = String(region || "KLN").trim().toUpperCase();
  const order = [preferred, "HKI", "KLN", "NT"].filter((v, i, arr) => arr.indexOf(v) === i);
  let all = [];
  for (const regionCode of order) {
    try {
      const rows = await searchGmbInRegion(route, regionCode);
      if (rows.length) {
        all = rows;
        break;
      }
    } catch {}
  }
  if (!all.length) {
    throw new Error(`找不到 GMB ${route}。`);
  }
  return all;
}
async function searchRoutes(){
  const company = $("company").value;
  const route = normalRoute($("route").value);
  const direction = $("direction").value;
  const region = $("region").value;

    let stops = [];

    $("search-btn").disabled = false;
  }
}
function addRoute(item){
  const routes = getRoutes();
  const exists = routes.some(route =>
    route.company === item.company &&
    route.route === item.route &&
    route.stopId === item.stopId &&
    route.routeSeq === item.routeSeq
  );
  if (exists) {
    setMessage("此路線及車站已加入。", "error");
    return;
  }
  routes.push({
    id: `${item.company}-${item.route}-${item.stopId}-${Date.now()}`,
    company: item.company,
    route: item.route,
    stopId: item.stopId,
    stopName: item.stopName,
    destination: item.destination || "",
    bound: item.bound || "",
    region: item.region || "",
    routeId: item.routeId || "",
    routeSeq: item.routeSeq,
    stopSeq: item.stopSeq,
    etas: [],
    pinned: false
  });
  saveState();
  $("results").innerHTML = "";
  setMessage(`已加入 ${item.company} ${item.route}：${item.stopName}`, "ok");
  renderCards();

async function getKmbEta(route){
  const json = await safeFetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${encodeURIComponent(route.stopId)}`);
  return (json.data || [])
    .filter(item =>
      normalRoute(item.route) === normalRoute(route.route) &&
      (!route.bound || !item.dir || String(item.dir).toUpperCase() === String(route.bound).toUpperCase())
    )
    .map(item => ({
      operator: "KMB",
      eta: item.eta,
      destination: pickText(item.dest_tc, item.dest_en, route.destination)
    }))
    .filter(item => item.eta && isLiveEta(item.eta));
}
async function getCtbEta(route){
  const json = await safeFetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${encodeURIComponent(route.stopId)}/${encodeURIComponent(route.route)}`);
  return (json.data || [])
    .filter(item => normalRoute(item.route) === normalRoute(route.route))
    .map(item => ({
      operator: "CTB",
      eta: item.eta,
      destination: pickText(item.dest_tc, item.dest_en, route.destination)
    }))
    .filter(item => item.eta && isLiveEta(item.eta));
}
async function getGmbEta(route){
  if (!route.routeId) {
    throw new Error("GMB route_id 缺少；請刪除後重新加入。");
  }
  const hasSeq = Number.isFinite(Number(route.routeSeq)) && Number.isFinite(Number(route.stopSeq));
  if (hasSeq) {
    try {
      const json = await safeFetch(`https://data.etagmb.gov.hk/eta/route-stop/${encodeURIComponent(route.routeId)}/${encodeURIComponent(route.routeSeq)}/${encodeURIComponent(route.stopSeq)}`);
      const data = json.data;
      if (data && data.enabled === false) {
        throw new Error(pickText(data.description_tc, data.description_en, "到站預報暫停"));
      }
      const etaList = Array.isArray(data?.eta) ? data.eta : [];
      const rows = etaList
        .map(item => ({
          operator: "GMB",
          eta: item.timestamp || item.eta || "",
          remark: pickText(item.remarks_tc, item.remarks_en),
          destination: route.destination
        }))
        .filter(item => item.eta);
      if (rows.length) {
        return rows
          .filter(item => isLiveEta(item.eta))
          .sort((a, b) => parseHongKongDate(a.eta) - parseHongKongDate(b.eta))
          .slice(0, 3);
      }
    } catch {}
  }
  if (!route.stopId || !/^\d+$/.test(String(route.stopId))) {
    throw new Error("GMB stop_id 不可用，且 route_seq/stop_seq 查詢亦失敗。");
  }
  const json = await safeFetch(`https://data.etagmb.gov.hk/eta/route-stop/${encodeURIComponent(route.routeId)}/${encodeURIComponent(route.stopId)}`);
  const rows = Array.isArray(json.data) ? json.data : [];
  const matched =
    rows.find(item => Number(item.route_seq) === Number(route.routeSeq) && Number(item.stop_seq) === Number(route.stopSeq)) ||
    rows.find(item => item.enabled && Array.isArray(item.eta)) ||
    rows[0];
  if (!matched) return [];
  if (matched.enabled === false) {
    throw new Error(pickText(matched.description_tc, matched.description_en, "到站預報暫停"));
  }
  return (Array.isArray(matched.eta) ? matched.eta : [])
    .map(item => ({
      operator: "GMB",
      eta: item.timestamp || item.eta || "",
      remark: pickText(item.remarks_tc, item.remarks_en),
      destination: route.destination
    }))
    .filter(item => item.eta && isLiveEta(item.eta))
    .sort((a, b) => parseHongKongDate(a.eta) - parseHongKongDate(b.eta))
    .slice(0, 3);
}
async function getRouteEta(route){
  let etas = [];
  if (route.company === "KMB") etas = await getKmbEta(route);
  if (route.company === "CTB") etas = await getCtbEta(route);
  if (route.company === "GMB") etas = await getGmbEta(route);
  return etas.sort((a, b) => parseHongKongDate(a.eta) - parseHongKongDate(b.eta)).slice(0, 3);
}
function visibleRoutes(){

    }).join("");
    return `<article class="route-card ${isPinned ? 'pinned' : ''}">

          <span class="route-no">${escapeHtml(route.route)}</span>
          <div style="min-width:0">
            <div class="route-dest">往 ${escapeHtml(route.destination || route.stopName || "路線目的地")}</div>
            <div class="route-stop">${escapeHtml(route.stopName)}</div>
          </div>
        </div>
        <div class="route-head-actions">
          <button class="btn" type="button" data-pin="${escapeHtml(route.id)}">${isPinned ? '取消釘選' : '釘選'}</button>
          <button class="btn danger" type="button" data-remove="${escapeHtml(route.id)}">刪除</button>
        </div>
      </div>
      <div class="route-op">${escapeHtml(route.company)}${route.region ? `｜${escapeHtml(route.region)}` : ''}${route.bound ? `｜${escapeHtml(route.bound === 'I' ? '回程' : '去程')}` : ''}${isPinned ? '｜已釘選' : ''}</div>
      <div class="etas">${etaBoxes}</div>
    </article>`;
  }).join("");
  $("cards").querySelectorAll("[data-remove]").forEach(button => {

  $("cards").querySelectorAll("[data-pin]").forEach(button => {

function removeRoute(id){

function togglePin(id){
  const route = getRoutes().find(r => r.id === id);

  route.pinned = !route.pinned;

async function refreshEtas(){
  const routes = getRoutes();
  if (!routes.length) {
    updateLastUpdate();
    updateSummary();
    return;
  }
  await Promise.all(routes.map(async route => {
    try {
      route.etas = await getRouteEta(route);
      if (!route.destination) {
        const first = route.etas.find(x => x.destination)?.destination;
        if (first) route.destination = first;
      }
    } catch {
      route.etas = [];
    }
  }));
  saveState();
  renderCards();
  updateLastUpdate();
  updateSummary();
}
function updateLastUpdate(){
  $("last-update").textContent = `最後更新：${new Date().toLocaleTimeString("zh-HK", {
    hour: "2-digit",

    hour12: false,

function updateSummary(){
  const routes = getRoutes();
  const pinned = routes.filter(r => r.pinned).length;
  $("sum-routes").textContent = routes.length;
  $("sum-pinned").textContent = pinned;
  let minMinutes = Infinity;
  for (const route of routes) {
    for (const eta of (route.etas || [])) {
      const m = etaMinutes(eta.eta);
      if (Number.isFinite(m) && m >= 0 && m < minMinutes) minMinutes = m;
    }
  }
  $("sum-next").textContent = minMinutes === Infinity ? "--" : `${minMinutes} 分`;
  $("sum-weather").textContent = $("weather-chip")?.textContent?.trim() || "--";
}

function weatherText(icon){
  const map = {
    50:"陽光充沛",51:"間中有陽光",52:"短暫陽光",
    53:"有驟雨",54:"有驟雨",
    60:"多雲",61:"密雲",62:"微雨",63:"有雨",64:"大雨",65:"雷暴",
    70:"天晴",76:"大致多雲",77:"多雲"
  };
  return map[icon] || "天氣資料";
}
function riskInfo(score){
  if (score >= 70) return { text:"大雨風險", color:"#dc2626" };
  if (score >= 40) return { text:"可能有雨", color:"#d97706" };
  return { text:"暫時較乾", color:"#15803d" };
}
function showRainRisk(minutes, score){
  const info = riskInfo(score);
  const value = document.getElementById(`rain-${minutes}-value`);
  value.textContent = `${score}%`;
  value.style.color = info.color;
  document.getElementById(`rain-${minutes}-detail`).textContent = info.text;
}
function calculateRainRisk(rainfall, icon, warnings){
  let base = 10;
  if (rainfall >= 30) base = 95;
  else if (rainfall >= 10) base = 80;
  else if (rainfall >= 2) base = 60;
  else if (rainfall > 0) base = 35;
  if ([53, 54, 62, 63].includes(icon)) base = Math.max(base, 45);
  if ([64, 65].includes(icon)) base = Math.max(base, 78);
  const text = warnings.join(" ");
  if (/雷暴|Thunderstorm/i.test(text)) base = Math.max(base, 75);
  if (/暴雨|Rainstorm/i.test(text)) base = Math.max(base, 85);
  return {
    min5: Math.min(100, Math.round(base)),
    min10: Math.min(100, Math.round(base + (base >= 50 ? 4 : 8))),
    min15: Math.min(100, Math.round(base + (base >= 50 ? 8 : 14)))
  };
}
function buildBeforeGoRemark(temp, risk, warnings){
  const text = warnings.join(" ");
  const tips = [];
  if (/雷暴|暴雨/.test(text) || risk.min5 >= 70) tips.push("建議帶傘，最好預留 5 至 10 分鐘。");
  else if (risk.min10 >= 40) tips.push("天氣未算穩定，建議帶輕便雨具。");
  else tips.push("短時間內落雨風險較低，可按原定時間出門。");
  if (temp >= 32) tips.push("氣溫較高，記得補水。");
  if (temp <= 18) tips.push("早上偏涼，可加件薄外套。");
  return tips.join(" ");
}
async function refreshWeather(){
  try {
    const [weatherJson, warningJson] = await Promise.all([
      safeFetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"),
      safeFetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc").catch(() => ({}))
    ]);
    const findKwunTong = rows =>
      rows.find(row => String(row.place || "").includes("觀塘") || String(row.place || "").includes("Kwun Tong")) || rows[0];
    const temperatureRow = findKwunTong(weatherJson.temperature?.data || []);
    const humidityRow = findKwunTong(weatherJson.humidity?.data || []);
    const rainfallRow = findKwunTong(weatherJson.rainfall?.data || []);
    const icon = Number(weatherJson.icon?.[0] || 0);
    const temp = Number(temperatureRow?.value ?? 0);
    const humidity = Number(humidityRow?.value ?? 0);
    const rainfall = Number(rainfallRow?.max ?? rainfallRow?.min ?? 0);
    const warnings = Object.values(warningJson || {})
      .filter(item => item && item.name && item.actionCode !== "CANCEL")
      .map(item => item.name);
    const desc = weatherText(icon);
    $("kwt-current-weather").textContent = `${Number.isFinite(temp) ? temp + "°C" : "--"}・${desc}`;
    $("kwt-current-detail").textContent = `觀塘過去 1 小時雨量：約 ${rainfall} mm`;
    $("weather-chip").textContent = `觀塘：${Number.isFinite(temp) ? temp + "°C" : "--"}｜濕度：${Number.isFinite(humidity) ? humidity + "%" : "--"}｜${desc}`;
    const risk = calculateRainRisk(rainfall, icon, warnings);
    showRainRisk(5, risk.min5);
    showRainRisk(10, risk.min10);
    showRainRisk(15, risk.min15);
    $("before-go-remark").textContent = buildBeforeGoRemark(temp, risk, warnings);
    const warningBox = $("warning-list");
    if (!warnings.length) {
      warningBox.innerHTML = `<span class="note">目前未見特別天氣警告。</span>`;
    } else {
      warningBox.innerHTML = warnings.map(name => `<span class="warning-item">${escapeHtml(name)}</span>`).join("");
    }
    $("weather-updated").textContent = `更新：${new Date().toLocaleTimeString("zh-HK", {
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
      timeZone: "Asia/Hong_Kong"
    })}`;
    $("status-chip").textContent = "狀態：正常";
    updateSummary();
  } catch (error) {
    $("kwt-current-weather").textContent = "未能讀取天氣";
    $("kwt-current-detail").textContent = error.message;
    $("before-go-remark").textContent = "請稍後再試，出門前建議帶傘作後備。";
    ["5", "10", "15"].forEach(m => {
      $("rain-" + m + "-value").textContent = "--";
      $("rain-" + m + "-detail").textContent = "未能更新";
    });
    $("weather-chip").textContent = "天氣暫未能更新";
    $("status-chip").textContent = "狀態：天氣更新失敗";
  }
}

  $("refresh-btn").onclick = refreshAll;
  $("route").onkeydown = e => { if (e.key === "Enter") searchRoutes(); };
  $("home-btn").onclick = () => {
    setPlace("home");
  };
  $("office-btn").onclick = () => {
    setPlace("office");
  };
  $("dark-btn").onclick = () => document.body.classList.toggle("dark");
  $("pin-filter-btn").onclick = () => toggleFilterPinnedOnly(true);
  $("all-filter-btn").onclick = () => toggleFilterPinnedOnly(false);
  $("auto-refresh-btn").onclick = toggleAutoRefresh;
  $("export-btn").onclick = exportRoutes;
  $("import-btn").onclick = () => $("import-file").click();
  $("import-file").onchange = e => {
    const file = e.target.files?.[0];
    if (file) importRoutesFromFile(file);
    e.target.value = "";
  };
  changeCompanyUI();
  refreshAll();
  startAutoRefresh();
  setInterval(() => {
    if (state.autoRefresh) updateSummary();
  }, 15000);
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }
}
init();
</script>
</body>
</html>
